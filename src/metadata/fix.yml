# PURL configuration for http://purl.obolibrary.org/obo/fix

idspace: FIX
base_url: /obo/fix

products:
- fix.owl: https://raw.githubusercontent.com/cmungall/fix/main/fix.owl
- fix.obo: https://raw.githubusercontent.com/cmungall/fix/main/fix.obo

term_browser: ontobee
example_terms:
- FIX_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/cmungall/fix/v

- prefix: /tracker/
  replacement: https://github.com/cmungall/fix/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/FIX?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/cmungall/fix/main/

